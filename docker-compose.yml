version: '3.8'

services:
  # Frontend - React PWA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:5000/api
      - VITE_GRAPHQL_URL=http://backend:5000/graphql
      - VITE_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    depends_on:
      - backend
    networks:
      - white-owl-network
    restart: unless-stopped

  # Backend - Node.js API Gateway
  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=white_owl
      - MONGODB_URI=mongodb://mongo:27017/white_owl
      - JWT_SECRET=${JWT_SECRET}
      - ROUTING_SERVICE_URL=http://routing:8000
      - FRONTEND_URL=http://frontend:80
    depends_on:
      - mysql
      - mongo
      - routing
    networks:
      - white-owl-network
    restart: unless-stopped

  # Routing Service - Python FastAPI
  routing:
    build:
      context: ./routing-service-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - white-owl-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=white_owl
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - white-owl-network
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - white-owl-network
    restart: unless-stopped

networks:
  white-owl-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
